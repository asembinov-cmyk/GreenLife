<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=5">
<meta name="theme-color" content="#fbfaf7">
<title>Green Life — CRM отдела продаж</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#f7f6f3; --ink-2:#ffffff; --line:#e3e0d9;
  --paper:#1a1d24; --mute:#6f7687;
  --signal:#0a8f5f;      /* деньги / выигрыш */
  --alert:#d93d2e;       /* просрочка / отказ */
  --amber:#c47800;       /* в работе */
  --violet:#6d4fd4;      /* коммуникации */
  --r:14px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --tabbar:64px;
  --vh:100vh;            /* подменяется на 100dvh или пиксели из скрипта */
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
html,body{overscroll-behavior-y:none}   /* без резинового отскока */
body{background:var(--ink);color:var(--paper);font:15px/1.5 Inter,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:var(--vh)}
h1,h2,h3,.disp{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.02em}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:0;background:none;-webkit-tap-highlight-color:transparent}
a{color:inherit}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

/* ---------- shell ---------- */
#app{display:grid;grid-template-columns:232px 1fr;min-height:var(--vh)}
aside{background:#fbfaf7;border-right:1px solid var(--line);padding:20px 14px;display:flex;
  flex-direction:column;gap:4px;position:sticky;top:0;height:var(--vh)}
.brand{font-family:'Bricolage Grotesque';font-weight:800;font-size:20px;padding:0 10px 18px;display:flex;align-items:center;gap:9px;white-space:nowrap}
.brand i{width:11px;height:11px;background:var(--signal);border-radius:3px;display:block}
nav button{display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;border-radius:10px;color:var(--mute);font-weight:500;text-align:left}
nav button:hover{background:#efece5;color:var(--paper)}
nav button.on{background:var(--paper);color:var(--ink);font-weight:600}
nav .grp{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#5b6377;padding:16px 11px 6px;font-weight:600}
.me{margin-top:auto;border-top:1px solid var(--line);padding-top:14px;font-size:13px;color:var(--mute)}
.me b{display:block;color:var(--paper);font-size:14px}

/* мобильные элементы — по умолчанию скрыты */
.mtop,.tabbar,.mmenu{display:none}

main{padding:26px 30px 60px;max-width:1500px;min-width:0}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.head h1{font-size:30px;font-weight:700}
.head p{color:var(--mute);font-size:14px;margin-top:3px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

.btn{background:var(--paper);color:var(--ink);padding:9px 16px;border-radius:10px;font-weight:600;font-size:14px}
.btn:hover{opacity:.88}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--paper)}
.btn.ghost:hover{border-color:var(--mute)}
.btn.sm{padding:6px 11px;font-size:13px;border-radius:8px}
input,select,textarea{background:var(--ink-2);border:1px solid var(--line);border-radius:10px;padding:9px 12px;width:100%;outline:none}
input[type=checkbox]{width:16px;height:16px;padding:0;border-radius:4px;accent-color:var(--signal);flex:none}
input:focus,select:focus,textarea:focus{border-color:var(--mute)}
label{display:block;font-size:12px;color:var(--mute);margin:0 0 5px;font-weight:500}
.field{margin-bottom:12px}

.card{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:0 1px 2px rgba(26,29,36,.04)}
.grid{display:grid;gap:14px}

/* ---------- KPI ---------- */
.kpis{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
.kpi .lbl{font-size:12px;color:var(--mute);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.kpi .val{font-family:'Bricolage Grotesque';font-size:34px;font-weight:800;margin-top:6px;line-height:1}
.kpi .sub{font-size:12px;color:var(--mute);margin-top:6px}

/* ---------- плитки категорий ---------- */
.tiles{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;
  -webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;overscroll-behavior-x:contain}
.tile{flex:0 0 auto;min-width:132px;background:var(--ink-2);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;text-align:left;scroll-snap-align:start}
.tile .n{font-family:'Bricolage Grotesque';font-size:26px;font-weight:800;line-height:1}
.tile .t{font-size:12px;color:var(--mute);margin-top:5px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.tile .s{font-size:11px;color:var(--mute);margin-top:3px;font-variant-numeric:tabular-nums}
.tile.warn .n{color:var(--alert)}

/* ---------- фото товара ---------- */
.num{color:var(--mute);font-family:'JetBrains Mono',monospace;font-size:12px;
  font-variant-numeric:tabular-nums;text-align:right;width:34px;padding-right:4px}
.thumb{width:38px;height:38px;border-radius:8px;background:var(--ink);border:1px solid var(--line);
  overflow:hidden;display:grid;place-items:center;flex:none}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-box{width:104px;height:104px;border-radius:12px;border:1px solid var(--line);background:var(--ink);
  overflow:hidden;display:grid;place-items:center;flex:none;margin-right:14px}
.photo-box img{width:100%;height:100%;object-fit:cover;display:block}
.photo-box span{font-size:12px;color:var(--mute)}

/* ---------- телефон с префиксом ---------- */
.tel{display:flex;align-items:stretch;background:var(--ink-2);border:1px solid var(--line);
  border-radius:10px;overflow:hidden}
.tel:focus-within{border-color:var(--mute)}
.tel .pfx{display:grid;place-items:center;padding:0 10px 0 12px;color:var(--mute);
  font-family:'JetBrains Mono',monospace;font-size:15px;border-right:1px solid var(--line);
  background:var(--ink);user-select:none}
.tel input{border:0;border-radius:0;background:transparent;font-family:'JetBrains Mono',monospace;
  letter-spacing:.04em}
.tel input:focus{border:0}
.up{color:var(--signal)} .down{color:var(--alert)}

/* ---------- table ---------- */
.tw{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);padding:0 12px 10px;font-weight:600;white-space:nowrap}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--paper)}
th.sortable.on{color:var(--paper)}
th .arw{display:inline-block;width:10px;margin-left:4px;font-size:10px}
td{padding:11px 12px;border-top:1px solid var(--line);vertical-align:middle}
tbody tr{cursor:pointer}
tbody tr:hover td{background:#faf9f6}
.tag{display:inline-block;padding:3px 9px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap}
.avatar{width:26px;height:26px;border-radius:8px;background:var(--line);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--paper)}

/* карточный список — только для мобильного */
.clist{display:none}
.crow{border-top:1px solid var(--line);padding:12px 2px;display:flex;gap:12px;align-items:flex-start}
.crow:first-child{border-top:0}
.crow .main{flex:1;min-width:0}
.crow .ttl{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.crow .sub{font-size:12.5px;color:var(--mute);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.crow .right{text-align:right;flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.sortbar{display:none;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px;overscroll-behavior-x:contain}
.sortbar button{flex:0 0 auto;border:1px solid var(--line);border-radius:99px;padding:6px 12px;font-size:13px;color:var(--mute);background:var(--ink-2)}
.sortbar button.on{border-color:var(--paper);color:var(--paper);font-weight:600}

/* ---------- pipeline ---------- */
.pipe{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;align-items:flex-start;
  -webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}
.col{min-width:262px;flex:1;background:var(--ink-2);border:1px solid var(--line);border-radius:var(--r);padding:12px}
.col>h3{font-size:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.col .cnt{font-size:12px;color:var(--mute)}
.deal{background:#f7f6f3;border-radius:11px;padding:11px;margin-bottom:8px;cursor:grab;border-left:3px solid transparent}
.deal:active{cursor:grabbing}
.deal .nm{font-weight:600;font-size:14px}
.deal .amt{font-family:'JetBrains Mono';font-weight:700;font-size:15px;margin-top:4px}
.deal .meta{font-size:12px;color:var(--mute);margin-top:6px;display:flex;justify-content:space-between}
.col.over{outline:2px dashed var(--mute)}

/* ---------- bars ---------- */
.bar{height:9px;background:var(--line);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--signal);border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.spark{display:flex;align-items:flex-end;gap:3px;height:52px}
.spark i{flex:1;background:var(--line);border-radius:3px 3px 0 0;min-height:2px;transition:height .5s}
.spark i.hot{background:var(--signal)}

/* ---------- drawer ---------- */
.scrim{position:fixed;inset:0;background:#1a1d2455;backdrop-filter:blur(3px);z-index:40}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(560px,100%);background:var(--ink-2);
  border-left:1px solid var(--line);z-index:41;overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;padding:22px;animation:sl .22s cubic-bezier(.2,.8,.2,1)}
@keyframes sl{from{transform:translateX(24px);opacity:0}}
@keyframes su{from{transform:translateY(28px);opacity:0}}
.modal{position:fixed;inset:0;display:grid;place-items:center;z-index:41;padding:20px}
.modal .card{width:min(520px,100%);max-height:88vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.x{position:absolute;top:16px;right:18px;font-size:22px;color:var(--mute);width:38px;height:38px;border-radius:10px}
.x:active{background:var(--ink)}

/* ---------- timeline ---------- */
.tl{position:relative;padding-left:22px;margin-top:8px}
.tl:before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:1px;background:var(--line)}
.ev{position:relative;padding:9px 0}
.ev:before{content:'';position:absolute;left:-19px;top:15px;width:9px;height:9px;border-radius:99px;background:var(--line);border:2px solid var(--ink-2)}
.ev.call:before{background:var(--amber)} .ev.whatsapp:before{background:var(--signal)}
.ev.note:before{background:var(--violet)} .ev.status:before{background:var(--mute)}
.ev .t{font-size:11px;color:var(--mute);font-family:'JetBrains Mono'}
.ev .b{font-size:14px;margin-top:2px}

/* ---------- AI ---------- */
.ai{display:flex;flex-direction:column;height:calc(var(--vh) - 190px);min-height:400px}
.msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  display:flex;flex-direction:column;gap:12px;padding-right:6px}
.msg{max-width:82%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.55;white-space:pre-wrap;overflow-wrap:anywhere}
.msg.u{align-self:flex-end;background:var(--paper);color:var(--ink);border-bottom-right-radius:4px}
.msg.a{align-self:flex-start;background:#efece5;border-bottom-left-radius:4px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.chip{border:1px solid var(--line);border-radius:99px;padding:6px 13px;font-size:13px;color:var(--mute)}
.chip:hover{border-color:var(--signal);color:var(--signal)}
.dots i{display:inline-block;width:6px;height:6px;background:var(--mute);border-radius:99px;margin-right:4px;animation:bl 1.2s infinite}
.dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,60%,100%{opacity:.25}30%{opacity:1}}

/* ---------- auth ---------- */
#auth{min-height:var(--vh);display:grid;place-items:center;padding:20px}
#auth .card{width:min(400px,100%)}
.err{color:var(--alert);font-size:13px;margin-top:10px}
.empty{text-align:center;color:var(--mute);padding:44px 20px}
.empty b{display:block;color:var(--paper);font-family:'Bricolage Grotesque';font-size:18px;margin-bottom:6px}

/* ==========================================================
   МОБИЛЬНАЯ ВЕРСИЯ
   ========================================================== */
@media(max-width:900px){
  /* поля 16px — iOS не зумит при фокусе */
  input,select,textarea{font-size:16px;padding:12px 13px;border-radius:12px}
  input[type=checkbox]{width:20px;height:20px}
  .btn{padding:11px 16px;border-radius:12px;font-size:15px}
  .btn.sm{padding:8px 12px;font-size:14px}

  #app{display:block;min-height:var(--vh)}
  aside{display:none}

  /* верхняя шапка */
  .mtop{display:flex;position:sticky;top:0;z-index:30;align-items:center;justify-content:space-between;
    gap:10px;background:#fbfaf7;border-bottom:1px solid var(--line);
    padding:calc(10px + var(--safe-t)) 14px 10px;transform:translateZ(0)}
  .mtop .brand{padding:0;font-size:18px}
  .mtop .u{display:flex;align-items:center;gap:8px}
  .mtop .u .avatar{width:34px;height:34px;border-radius:11px;font-size:12px;background:var(--paper);color:var(--ink)}

  /* нижний отступ = высота панели + safe-area + запас */
  main{padding:14px 14px calc(var(--tabbar) + var(--safe-b) + 34px);max-width:100%}

  .head{align-items:flex-start;gap:12px;margin-bottom:16px}
  .head h1{font-size:23px}
  .head p{font-size:13px}
  .head .row{width:100%}
  .head .row .btn{flex:1;text-align:center}
  .head .row input{width:100%!important;flex:1 1 100%}

  /* KPI 2 в ряд */
  .kpis{grid-template-columns:1fr 1fr;gap:10px}
  .card{padding:14px;border-radius:14px}
  .kpi .val{font-size:24px}
  .kpi .lbl{font-size:10.5px;letter-spacing:.04em}
  .kpi .sub{font-size:11px}

  /* все двухколоночные сетки — в одну */
  .grid[style*="1.4fr"],.grid[style*="1fr 1fr"]{grid-template-columns:1fr!important}
  .grid{grid-template-columns:1fr!important}

  /* таблицы -> карточки */
  .tw{display:none}
  .clist{display:block}
  .sortbar{display:flex}

  /* фильтры в строку с прокруткой */
  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;
    -webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}
  .filters>*{flex:0 0 auto;width:auto!important}
  .filters .grow{flex:1 1 190px;min-width:170px}
  .filters .cnt{margin-left:0!important;align-self:center;white-space:nowrap}

  /* воронка: колонки на всю ширину экрана */
  .pipe{gap:10px;scroll-snap-type:x mandatory;margin:0 -14px;padding:0 14px 8px}
  .col{min-width:min(84vw,320px);flex:0 0 auto;scroll-snap-align:center}

  /* drawer / modal — снизу, почти на весь экран, высота от реального вьюпорта */
  .drawer{top:auto;left:0;right:0;bottom:0;width:100%;height:calc(var(--vh) * .92);
    border-left:0;border-top:1px solid var(--line);border-radius:20px 20px 0 0;
    padding:20px 16px calc(24px + var(--safe-b));animation:su .24s cubic-bezier(.2,.8,.2,1)}
  .drawer:before{content:'';display:block;width:38px;height:4px;border-radius:99px;background:var(--line);
    margin:-6px auto 12px}
  .modal{place-items:end center;padding:0}
  .modal .card{width:100%;max-height:calc(var(--vh) * .92);border-radius:20px 20px 0 0;border-bottom:0;
    padding:20px 16px calc(24px + var(--safe-b));animation:su .24s cubic-bezier(.2,.8,.2,1)}
  .modal .card:before{content:'';display:block;width:38px;height:4px;border-radius:99px;background:var(--line);
    margin:-6px auto 12px}
  .modal .row .btn,.drawer .row .btn{flex:1;text-align:center}

  /* AI */
  .ai{height:calc(var(--vh) - var(--tabbar) - var(--safe-b) - 210px);min-height:320px;padding:12px}
  .msg{max-width:92%}
  .chips{gap:6px;overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;margin:10px 0;overscroll-behavior-x:contain}
  .chip{flex:0 0 auto;padding:8px 14px}

  /* нижняя навигация — фиксированная высота, свой слой, без прыжков */
  .tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:35;
    height:calc(var(--tabbar) + var(--safe-b));
    background:#fbfaf7;border-top:1px solid var(--line);
    padding:6px 4px calc(6px + var(--safe-b));
    transform:translateZ(0);will-change:transform}
  .tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    padding:4px 2px;color:var(--mute);font-size:10.5px;font-weight:600;border-radius:12px}
  .tabbar button span.ic{font-size:19px;line-height:1}
  .tabbar button.on{color:var(--paper)}
  .tabbar button.on span.ic{color:var(--signal)}

  /* лист «Ещё» */
  .mmenu{display:block;position:fixed;left:0;right:0;bottom:0;z-index:42;background:var(--ink-2);
    border-radius:20px 20px 0 0;padding:18px 16px calc(20px + var(--safe-b));
    max-height:calc(var(--vh) * .8);overflow-y:auto;overscroll-behavior:contain;
    animation:su .22s cubic-bezier(.2,.8,.2,1)}
  .mmenu:before{content:'';display:block;width:38px;height:4px;border-radius:99px;background:var(--line);margin:-6px auto 14px}
  .mmenu button{display:flex;align-items:center;gap:12px;width:100%;padding:14px 10px;
    border-radius:12px;font-size:16px;font-weight:500;text-align:left;border-top:1px solid var(--line)}
  .mmenu button:first-of-type{border-top:0}
  .mmenu .mm-me{font-size:13px;color:var(--mute);padding:0 10px 10px}
  .mmenu .mm-me b{display:block;color:var(--paper);font-size:16px;font-family:'Bricolage Grotesque'}

  .empty{padding:32px 14px}
  .tiles{margin:0 -14px 14px;padding:0 14px 6px}
  .tl{padding-left:20px}
  .photo-box{width:88px;height:88px}
}
@media(max-width:380px){
  .kpis{grid-template-columns:1fr}
  .head h1{font-size:21px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div id="auth" style="display:none">
  <div class="card">
    <div class="brand" style="padding-left:0"><i></i>Green Life</div>
    <p style="color:var(--mute);font-size:14px;margin-bottom:18px">CRM отдела продаж<br><span style="font-size:13px">Вход по номеру телефона. Доступ выдаёт администратор.</span></p>
    <div class="field"><label>Телефон</label>
      <div class="tel"><span class="pfx">+7</span>
        <input id="em" type="tel" inputmode="numeric" autocomplete="username" maxlength="14"
          placeholder="777 123 45 67" oninput="maskTel(this)"
          onkeydown="if(event.key==='Enter')el('pw').focus()"></div></div>
    <div class="field"><label>Пароль</label>
      <div style="position:relative">
        <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••"
          style="padding-right:80px" onkeydown="if(event.key==='Enter')signIn()">
        <button type="button" id="pwEye" onclick="togglePw()" title="Показать пароль"
          style="position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:6px 10px;
                 color:var(--mute);font-size:13px">показать</button>
      </div></div>
    <div class="row" style="margin-top:16px">
      <button class="btn" onclick="signIn()" style="flex:1">Войти</button>
    </div>
    <div class="err" id="authErr"></div>
  </div>
</div>

<div id="app" style="display:none">
  <aside>
    <div class="brand"><i></i>Green Life</div>
    <nav id="nav"></nav>
    <div class="me" id="me"></div>
  </aside>
  <div style="min-width:0">
    <header class="mtop">
      <div class="brand"><i></i>Green Life</div>
      <div class="u">
        <span id="mtitle" style="font-size:13px;color:var(--mute)"></span>
        <button class="avatar" id="mavatar" onclick="moreMenu()"></button>
      </div>
    </header>
    <main id="view"></main>
  </div>
  <nav class="tabbar" id="tabbar"></nav>
</div>

<script>
/* ==========================================================
   0. ВЫСОТА ВЬЮПОРТА — лечит «дрожание» и западание под панель браузера
   ========================================================== */
function fixVH(){
  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--vh', h + 'px');
}
if(window.CSS && CSS.supports && CSS.supports('height','100dvh')){
  document.documentElement.style.setProperty('--vh','100dvh');
}else{
  fixVH();
  window.visualViewport && window.visualViewport.addEventListener('resize', fixVH);
  window.addEventListener('orientationchange', ()=>setTimeout(fixVH,300));
}

/* ==========================================================
   1. НАСТРОЙКА — ключи лежат в отдельном файле config.js
   ========================================================== */
const CFG = window.CRM_CONFIG || {};
const SUPABASE_URL  = CFG.url  || '';
const SUPABASE_ANON = CFG.anon || '';

// Edge Functions, которые вы разворачиваете у себя (см. инструкцию)
const FN = {
  whatsappSend: '/functions/v1/wa-send',    // отправка сообщения в WhatsApp
  callDial:     '/functions/v1/call-dial',  // клик-звонок через телефонию
  createUser:   '/functions/v1/create-user',// создание и правка сотрудников
  ai:           '/functions/v1/ai',         // прокси к Anthropic для AI-помощника
};

const sb = supabase.createClient(SUPABASE_URL || 'https://placeholder.supabase.co', SUPABASE_ANON || 'placeholder');

/* ========================================================== */
const S = { user:null, me:null, tab:'dash', statuses:[], employees:[], products:[],
            orders:[], customers:[], sources:[], categories:[], departments:[], ai:[],
            pFilter:{ cat:'', q:'', hidden:false }, pSort:{ by:'name', dir:1 },
            eFilter:{ dep:'', role:'', q:'', off:false }, eSort:{ by:'rev', dir:-1 } };

const isMobile = () => window.matchMedia('(max-width:900px)').matches;
const money = n => new Intl.NumberFormat('ru-RU').format(Math.round(n||0)) + ' ₸';
const moneyShort = n => { n = Math.round(n||0);
  if(Math.abs(n) >= 1e6) return (n/1e6).toFixed(n%1e6?1:0).replace('.',',')+' млн ₸';
  if(Math.abs(n) >= 1e4) return Math.round(n/1e3)+' тыс ₸';
  return money(n); };
const M = n => isMobile() ? moneyShort(n) : money(n);
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ini = s => (s||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const el = id => document.getElementById(id);
const dt = s => s ? new Date(s).toLocaleString('ru-RU',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
const days = (a,b=Date.now()) => Math.floor((b - new Date(a))/864e5);

/* ---------- AUTH ---------- */
async function boot(){
  if(!SUPABASE_URL || !SUPABASE_ANON){
    el('auth').style.display='grid';
    el('authErr').textContent = 'Не найден файл config.js с адресом проекта и ключом. Создайте его рядом с index.html.';
    return;
  }
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ el('auth').style.display='grid'; return; }
  S.user = session.user;
  el('auth').style.display='none'; el('app').style.display='';
  await loadAll(); renderNav(); go('dash'); live();
}
/* Поле идёт после префикса +7, поэтому в нём ждём 10 цифр.
   Но если человек вставил номер целиком (87071234567 или 77071234567) — тоже разберём. */
function normPhone(v){
  let d = String(v||'').replace(/\D/g,'');
  if(d.length===11 && (d[0]==='8' || d[0]==='7')) d = '7'+d.slice(1);
  else if(d.length===10) d = '7'+d;
  return d;
}

/* Разбивает цифры на группы: 777 123 45 67 */
function maskTel(input){
  let d = input.value.replace(/\D/g,'');
  if(d.length===11 && (d[0]==='8'||d[0]==='7')) d = d.slice(1);  // вставили с кодом страны
  d = d.slice(0,10);
  const g = [d.slice(0,3), d.slice(3,6), d.slice(6,8), d.slice(8,10)].filter(Boolean);
  input.value = g.join(' ');
}
const phoneLogin = d => d + '@greenlife.local';
const prettyPhone = d => d && d.length===11
  ? `+${d[0]} ${d.slice(1,4)} ${d.slice(4,7)} ${d.slice(7,9)} ${d.slice(9)}` : (d||'');

function togglePw(){
  const i = el('pw'), b = el('pwEye');
  const show = i.type === 'password';
  i.type = show ? 'text' : 'password';
  b.textContent = show ? 'скрыть' : 'показать';
}

async function signIn(){
  const d = normPhone(el('em').value);
  if(d.length !== 11) return el('authErr').textContent =
    'Введите 10 цифр номера, например 777 123 45 67';
  const { error } = await sb.auth.signInWithPassword({ email: phoneLogin(d), password: el('pw').value });
  if(error) return el('authErr').textContent = /Invalid login/i.test(error.message)
    ? 'Неверный номер или пароль' : 'Не удалось войти: ' + error.message;
  location.reload();
}
async function signOut(){ await sb.auth.signOut(); location.reload(); }

/* ---------- DATA ---------- */
async function loadAll(){
  const q = [
    sb.from('statuses').select('*').order('sort'),
    sb.from('employees').select('*'),
    sb.from('products').select('*').order('name'),
    sb.from('sources').select('*'),
    sb.from('categories').select('*'),
    sb.from('departments').select('*').order('name'),
    sb.from('customers').select('*').order('created_at',{ascending:false}).limit(500),
    sb.from('orders').select('*, customers(name,phone), employees(full_name), statuses(code,name,color)')
      .order('created_at',{ascending:false}).limit(600),
  ];
  const [st,em,pr,so,ca,dp,cu,or_] = await Promise.all(q);
  S.statuses=st.data||[]; S.employees=em.data||[]; S.products=pr.data||[];
  S.sources=so.data||[]; S.categories=ca.data||[]; S.departments=dp.data||[];
  S.customers=cu.data||[]; S.orders=or_.data||[];
  S.me = S.employees.find(e=>e.id===S.user.id) || { full_name:S.user.email, role:'sales' };
  el('me').innerHTML = `<b>${esc(S.me.full_name)}</b>${({sales:'Менеджер',head:'Руководитель',admin:'Администратор'})[S.me.role]||S.me.role} ·
    <a href="#" onclick="signOut();return false" style="color:var(--mute)">выйти</a>`;
  el('mavatar').textContent = ini(S.me.full_name);
}
function live(){
  sb.channel('crm')
    .on('postgres_changes',{event:'*',schema:'public',table:'orders'}, async()=>{ await loadAll(); go(S.tab); })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'activities'}, p=>{
      if(S.openOrder && p.new.order_id===S.openOrder) openOrder(S.openOrder);
    }).subscribe();
}

/* ---------- NAV ---------- */
const TABS = [
  ['Работа',[['dash','Дашборд','◧'],['pipe','Воронка','▤'],['orders','Заказы','▦'],['ai','AI-помощник','✦']]],
  ['База',  [['customers','Клиенты','◉'],['products','Товары','▩'],['team','Сотрудники','◍']]],
  ['Ещё',   [['analytics','Аналитика','◪'],['refs','Справочники','⚙']]],
];
const ALL_TABS = TABS.flatMap(([,items])=>items);
const TAB_NAME = Object.fromEntries(ALL_TABS.map(([k,n])=>[k,n]));
/* В нижней панели — 4 главных раздела + «Ещё» */
const BOTTOM = [['dash','Дашборд','◧'],['pipe','Воронка','▤'],['orders','Заказы','▦'],['ai','AI','✦']];
const MORE_KEYS = ['customers','products','team','analytics','refs'];

function renderNav(){
  el('nav').innerHTML = TABS.map(([g,items])=>
    `<div class="grp">${g}</div>` + items.map(([k,n,i])=>
      `<button data-k="${k}" onclick="go('${k}')"><span style="width:16px;opacity:.7">${i}</span>${n}</button>`).join('')
  ).join('');
  el('tabbar').innerHTML = BOTTOM.map(([k,n,i])=>
    `<button data-k="${k}" onclick="go('${k}')"><span class="ic">${i}</span>${n}</button>`).join('')
    + `<button data-k="__more" onclick="moreMenu()"><span class="ic">≡</span>Ещё</button>`;
}
function markNav(){
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.k===S.tab));
  const inBottom = BOTTOM.some(([k])=>k===S.tab);
  document.querySelectorAll('#tabbar button').forEach(b=>
    b.classList.toggle('on', b.dataset.k===S.tab || (b.dataset.k==='__more' && !inBottom)));
  el('mtitle').textContent = TAB_NAME[S.tab] || '';
}
function moreMenu(){
  closeAll();
  document.body.insertAdjacentHTML('beforeend',`
  <div class="scrim" onclick="closeAll()"></div>
  <div class="mmenu">
    <div class="mm-me"><b>${esc(S.me.full_name||'')}</b>${
      ({sales:'Менеджер',head:'Руководитель',admin:'Администратор'})[S.me.role]||S.me.role}</div>
    ${MORE_KEYS.map(k=>{ const t=ALL_TABS.find(x=>x[0]===k);
      return `<button onclick="closeAll();go('${k}')"><span style="width:20px;opacity:.6">${t[2]}</span>${t[1]}</button>`;
    }).join('')}
    <button onclick="signOut()" style="color:var(--alert)"><span style="width:20px">⏻</span>Выйти</button>
  </div>`);
}
function go(k){
  closeAll();
  S.tab=k;
  ({dash:vDash,pipe:vPipe,orders:vOrders,customers:vCustomers,products:vProducts,
    team:vTeam,analytics:vAnalytics,refs:vRefs,ai:vAI})[k]();
  markNav();
  window.scrollTo(0,0);
}
const H = (t,s,r='') => `<div class="head"><div><h1>${t}</h1><p>${s}</p></div><div class="row">${r}</div></div>`;

/* ---------- ДАШБОРД ---------- */
function myOrders(){ return S.me.role==='sales' ? S.orders.filter(o=>o.owner_id===S.user.id) : S.orders; }
function vDash(){
  const os = myOrders(), m0 = new Date(); m0.setDate(1); m0.setHours(0,0,0,0);
  const mth = os.filter(o=>new Date(o.created_at)>=m0);
  const won = mth.filter(o=>o.statuses?.code==='won');
  const rev = won.reduce((s,o)=>s+ +o.amount,0);
  const conv = mth.length ? (won.length/mth.length*100).toFixed(1) : '0.0';
  const avg = won.length ? rev/won.length : 0;
  const plan = S.me.plan_month || 0;
  const stale = os.filter(o=>!['won','lost'].includes(o.statuses?.code) && days(o.created_at)>3);

  // 14 дней активности
  const buckets = Array.from({length:14},(_,i)=>{
    const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-13+i);
    const n = os.filter(o=>{ const t=new Date(o.created_at); return t>=d && t<new Date(+d+864e5); }).length;
    return {d,n};
  });
  const mx = Math.max(1,...buckets.map(b=>b.n));

  el('view').innerHTML = H('Дашборд', `Сегодня ${new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}`,
    `<button class="btn" onclick="newOrder()">Новый заказ</button>`) +
  `<div class="grid kpis" style="margin-bottom:14px">
    <div class="card kpi"><div class="lbl">Выручка за месяц</div><div class="val up">${M(rev)}</div>
      ${plan?`<div class="bar" style="margin-top:10px"><i style="width:${Math.min(100,rev/plan*100)}%"></i></div>
      <div class="sub">${(rev/plan*100).toFixed(0)}% от плана ${M(plan)}</div>`:'<div class="sub">План не задан</div>'}</div>
    <div class="card kpi"><div class="lbl">Заказов в месяц</div><div class="val">${mth.length}</div>
      <div class="sub">${won.length} оплачено</div></div>
    <div class="card kpi"><div class="lbl">Конверсия</div><div class="val">${conv}%</div>
      <div class="sub">из заказа в оплату</div></div>
    <div class="card kpi"><div class="lbl">Средний чек</div><div class="val">${M(avg)}</div>
      <div class="sub">по оплаченным</div></div>
  </div>

  <div class="grid" style="grid-template-columns:1.4fr 1fr">
    <div class="card">
      <h3 style="font-size:16px;margin-bottom:14px">Поток заказов, 14 дней</h3>
      <div class="spark">${buckets.map(b=>`<i class="${b.n>=mx*.7&&b.n>0?'hot':''}" style="height:${b.n/mx*100}%" title="${b.d.toLocaleDateString('ru-RU')}: ${b.n}"></i>`).join('')}</div>
      <div class="row" style="justify-content:space-between;color:var(--mute);font-size:12px;margin-top:8px">
        <span>${buckets[0].d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</span><span>сегодня</span></div>
    </div>
    <div class="card">
      <h3 style="font-size:16px;margin-bottom:6px">Требуют внимания</h3>
      <p style="color:var(--mute);font-size:13px;margin-bottom:12px">Без движения больше 3 дней</p>
      ${stale.length ? stale.slice(0,6).map(o=>`
        <div class="row" style="justify-content:space-between;padding:11px 0;border-top:1px solid var(--line);cursor:pointer;flex-wrap:nowrap;gap:10px" onclick="openOrder(${o.id})">
          <div style="min-width:0"><div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(o.customers?.name||'Без имени')}</div>
          <div style="font-size:12px;color:var(--mute)">${esc(o.statuses?.name||'')} · ${days(o.created_at)} дн.</div></div>
          <div class="mono" style="font-weight:700;white-space:nowrap">${M(o.amount)}</div></div>`).join('')
        : `<div class="empty" style="padding:20px"><b>Всё в движении</b>Просроченных заказов нет</div>`}
    </div>
  </div>`;
}

/* ---------- ВОРОНКА ---------- */
function vPipe(){
  const os = myOrders();
  el('view').innerHTML = H('Воронка', isMobile()?'Нажмите на сделку, чтобы сменить этап':'Перетащите карточку, чтобы сменить этап',
    `<button class="btn" onclick="newOrder()">Новый заказ</button>`) +
  `<div class="pipe">${S.statuses.map(st=>{
    const list = os.filter(o=>o.status_id===st.id);
    const sum = list.reduce((s,o)=>s+ +o.amount,0);
    return `<div class="col" data-st="${st.id}" ondragover="event.preventDefault();this.classList.add('over')"
        ondragleave="this.classList.remove('over')" ondrop="drop(event,${st.id})">
      <h3><span style="color:${st.color}">${esc(st.name)}</span><span class="cnt">${list.length}</span></h3>
      <div class="mono" style="font-size:13px;color:var(--mute);margin-bottom:10px">${M(sum)}</div>
      ${list.length ? list.map(o=>`<div class="deal" draggable="true" ondragstart="event.dataTransfer.setData('id',${o.id})"
          onclick="openOrder(${o.id})" style="border-left-color:${st.color}">
        <div class="nm">${esc(o.customers?.name||'Без имени')}</div>
        <div class="amt">${M(o.amount)}</div>
        <div class="meta"><span>${esc(o.employees?.full_name||'—')}</span><span>${days(o.created_at)} дн.</span></div>
      </div>`).join('') : `<div style="color:var(--mute);font-size:13px;padding:6px 2px">Пусто</div>`}
    </div>`;}).join('')}</div>`;
}
async function drop(e,statusId){
  e.preventDefault(); document.querySelectorAll('.col').forEach(c=>c.classList.remove('over'));
  const id = +e.dataTransfer.getData('id'); if(!id) return;
  const st = S.statuses.find(s=>s.id===statusId);
  await sb.from('orders').update({ status_id:statusId, closed_at: ['won','lost'].includes(st.code)?new Date():null }).eq('id',id);
  await sb.from('activities').insert({ order_id:id, employee_id:S.user.id, type:'status', body:'Этап: '+st.name });
  await loadAll(); go('pipe');
}

/* ---------- ЗАКАЗЫ ---------- */
function vOrders(){
  el('view').innerHTML = H('Заказы','Все сделки и заявки',
    `<input id="q" placeholder="Поиск по клиенту или номеру" style="width:250px" oninput="drawOrders()">
     <button class="btn" onclick="newOrder()">Новый заказ</button>`) +
  `<div class="card" style="padding:14px"><div id="tbl"></div></div>`;
  drawOrders();
}
function drawOrders(){
  const q = (el('q')?.value||'').toLowerCase();
  const rows = myOrders().filter(o=>!q || (o.customers?.name||'').toLowerCase().includes(q) || (o.number||'').toLowerCase().includes(q));
  if(!rows.length){
    el('tbl').innerHTML = `<div class="empty"><b>Заказов пока нет</b>Создайте первый или подключите приём заявок по API</div>`;
    return;
  }
  el('tbl').innerHTML = `
  <div class="tw"><table><thead><tr>
    <th>Номер</th><th>Клиент</th><th>Сумма</th><th>Этап</th><th>Менеджер</th><th>Создан</th></tr></thead><tbody>
    ${rows.map(o=>`<tr onclick="openOrder(${o.id})">
      <td class="mono" style="color:var(--mute)">${esc(o.number||o.id)}</td>
      <td><div style="font-weight:600">${esc(o.customers?.name||'Без имени')}</div>
          <div style="font-size:12px;color:var(--mute)">${esc(o.customers?.phone||'')}</div></td>
      <td class="mono" style="font-weight:700">${money(o.amount)}</td>
      <td><span class="tag" style="background:${o.statuses?.color}22;color:${o.statuses?.color}">${esc(o.statuses?.name||'—')}</span></td>
      <td><span class="avatar">${ini(o.employees?.full_name)}</span></td>
      <td style="color:var(--mute);font-size:13px">${dt(o.created_at)}</td></tr>`).join('')}
    </tbody></table></div>
  <div class="clist">${rows.map(o=>`
    <div class="crow" onclick="openOrder(${o.id})">
      <div class="main">
        <div class="ttl">${esc(o.customers?.name||'Без имени')}</div>
        <div class="sub">
          <span class="tag" style="background:${o.statuses?.color}22;color:${o.statuses?.color}">${esc(o.statuses?.name||'—')}</span>
          <span>${days(o.created_at)} дн.</span>
        </div>
        <div class="sub mono" style="font-size:12px">${esc(o.customers?.phone||o.number||'')}</div>
      </div>
      <div class="right">
        <div class="mono" style="font-weight:700;font-size:15px">${moneyShort(o.amount)}</div>
        <span class="avatar">${ini(o.employees?.full_name)}</span>
      </div>
    </div>`).join('')}</div>`;
}

/* ---------- КАРТОЧКА ЗАКАЗА ---------- */
async function openOrder(id){
  S.openOrder = id;
  const o = S.orders.find(x=>x.id===id); if(!o) return;
  const [{data:acts},{data:items}] = await Promise.all([
    sb.from('activities').select('*, employees(full_name)').eq('order_id',id).order('created_at',{ascending:false}),
    sb.from('order_items').select('*, products(name,sku)').eq('order_id',id),
  ]);
  closeAll();
  const phone = o.customers?.phone || '';
  document.body.insertAdjacentHTML('beforeend', `
  <div class="scrim" onclick="closeAll()"></div>
  <div class="drawer">
    <button class="x" onclick="closeAll()">×</button>
    <div class="mono" style="color:var(--mute);font-size:12px">${esc(o.number||o.id)}</div>
    <h2 style="font-size:23px;margin:4px 0 3px;padding-right:44px">${esc(o.customers?.name||'Без имени')}</h2>
    <div style="color:var(--mute);font-size:14px">${phone?`<a href="tel:+${esc(phone.replace(/\D/g,''))}" class="mono">${esc(phone)}</a>`:'телефон не указан'}</div>
    <div class="mono" style="font-size:26px;font-weight:700;margin:14px 0">${money(o.amount)}</div>

    <div class="field"><label>Этап сделки</label>
      <select onchange="setStatus(${id},this.value)">
        ${S.statuses.map(s=>`<option value="${s.id}" ${s.id===o.status_id?'selected':''}>${esc(s.name)}</option>`).join('')}
      </select></div>

    <div class="row" style="margin-bottom:16px">
      <button class="btn ghost sm" onclick="dial('${esc(phone)}',${id})">Позвонить</button>
      <button class="btn ghost sm" onclick="waPrompt(${id},'${esc(phone)}')">WhatsApp</button>
      <button class="btn ghost sm" onclick="aiOrder(${id})">Разбор от AI</button>
    </div>

    ${items?.length?`<div class="card" style="padding:12px;margin-bottom:16px">
      <h3 style="font-size:14px;margin-bottom:8px">Состав заказа</h3>
      ${items.map(i=>`<div class="row" style="justify-content:space-between;font-size:14px;padding:5px 0;flex-wrap:nowrap;gap:10px">
        <span style="min-width:0;overflow:hidden;text-overflow:ellipsis">${esc(i.products?.name||'—')} × ${i.qty}</span>
        <span class="mono" style="white-space:nowrap">${money(i.qty*i.price)}</span></div>`).join('')}
    </div>`:''}

    <div class="field"><label>Добавить заметку</label>
      <textarea id="note" rows="3" placeholder="Что обсудили, что дальше"></textarea>
      <button class="btn sm" style="margin-top:8px" onclick="addNote(${id})">Сохранить заметку</button></div>

    <h3 style="font-size:15px;margin:20px 0 0">История</h3>

/* ---------- ЗВОНКИ ---------- */
async function dial(phone,orderId){
  if(!phone) return alert('У клиента не указан телефон');
  try{
    const { data:{ session } } = await sb.auth.getSession();
    const r = await fetch(SUPABASE_URL + FN.callDial, { method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
      body: JSON.stringify({ phone, order_id:orderId }) });
    if(!r.ok) throw 0;
    await sb.from('activities').insert({order_id:orderId,employee_id:S.user.id,type:'call',direction:'out',body:'Исходящий звонок на '+phone});
    openOrder(orderId);
  }catch{
    // на телефоне — просто звоним через системный набор
    if(isMobile()){
      location.href = 'tel:+' + phone.replace(/\D/g,'');
      setTimeout(async()=>{
        const d = prompt('Записать звонок в историю — что обсудили?');
        if(d){ await sb.from('activities').insert({order_id:orderId,employee_id:S.user.id,type:'call',direction:'out',body:d}); openOrder(orderId); }
      }, 1200);
      return;
    }
    const d = prompt('Телефония не отвечает. Записать звонок вручную — что обсудили?');
    if(d){ await sb.from('activities').insert({order_id:orderId,employee_id:S.user.id,type:'call',direction:'out',body:d}); openOrder(orderId); }
  }
}

/* Плитки-сводка: сколько позиций и на какую сумму в каждой категории */
function drawTiles(){
  const box = el('ptiles'); if(!box) return;
  const vis = p => S.pFilter.hidden || p.active!==false;
  const stat = list => ({ n:list.length, sum:list.reduce((a,p)=>a+(+p.price||0)*(+p.stock||0),0),
                          zero:list.filter(p=>!(+p.stock)).length });
  const cards = S.categories.map(c=>({ name:c.name,
    ...stat(S.products.filter(p=>vis(p) && p.category_id===c.id)) }));
  const noCat = S.products.filter(p=>vis(p) && !p.category_id);
  if(noCat.length) cards.push({ name:'Без категории', ...stat(noCat) });
  // Самые наполненные категории — слева
  cards.sort((a,b)=> b.n - a.n || a.name.localeCompare(b.name,'ru'));

  box.innerHTML = cards.length ? `<div class="tiles">${cards.map(c=>`
    <div class="tile ${c.n && c.zero===c.n ? 'warn':''}">
      <div class="n">${c.n}</div>
      <div class="t" title="${esc(c.name)}">${esc(c.name)}</div>
      <div class="s">${!c.n ? 'нет позиций' : c.zero ? c.zero+' без остатка' : M(c.sum)}</div>
    </div>`).join('')}</div>` : '';
}

function filteredProducts(){
  const f = S.pFilter, q = f.q.trim().toLowerCase();
  return S.products.filter(p=>{
    if(!f.hidden && p.active===false) return false;
    if(f.cat==='none' && p.category_id) return false;
    if(f.cat && f.cat!=='none' && String(p.category_id)!==f.cat) return false;
    if(q && !((p.name||'').toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q)
              || (p.description||'').toLowerCase().includes(q))) return false;
    return true;
  });
}

function sortProducts(by){
  const st = S.pSort;
  st.dir = (st.by === by) ? -st.dir : 1;   // повторный клик разворачивает
  st.by = by;
  drawProducts();
}

function applySort(rows){
  const { by, dir } = S.pSort;
  const catName = p => S.categories.find(c=>c.id===p.category_id)?.name || '';
  const key = {
    sku:   p => p.sku || '',
    name:  p => p.name || '',
    cat:   catName,
    price: p => +p.price || 0,
    cost:  p => +p.cost  || 0,
    stock: p => +p.stock || 0,
  }[by] || (p => p.name || '');
  const isText = ['sku','name','cat'].includes(by);
  return [...rows].sort((a,b)=>{
    const x = key(a), y = key(b);
    // пустые значения всегда внизу, независимо от направления
    if(isText){
      if(!x && y) return 1;
      if(x && !y) return -1;
      return x.localeCompare(y, 'ru') * dir;
    }
    return (x - y) * dir;
  });
}

  <div class="clist">${rows.map(p=>`

const photoPrev = () => S.photoDraft

async function uploadPhoto(input){
  const f = input.files?.[0]; if(!f) return;
  const hint = el('pHint');
  if(!f.type.startsWith('image/')) return hint.textContent = 'Нужен файл изображения';
  if(f.size > 5*1024*1024)        return hint.textContent = 'Файл больше 5 МБ';
  hint.textContent = 'Загружаю…';
  const ext = (f.name.split('.').pop() || 'jpg').toLowerCase();
  const path = `p_${Date.now()}_${Math.random().toString(36).slice(2,7)}.${ext}`;
  const { error } = await sb.storage.from('products').upload(path, f, { upsert:false });
  if(error){ hint.textContent = 'Не удалось загрузить: '+error.message; return; }
  S.photoDraft = sb.storage.from('products').getPublicUrl(path).data.publicUrl;
  el('pPrev').innerHTML = photoPrev();
  el('pDel').style.display = '';
  hint.textContent = 'Фото загружено';
  input.value = '';
}

function clearPhoto(){
  S.photoDraft = '';
  el('pPrev').innerHTML = photoPrev();
  el('pDel').style.display = 'none';
  el('pHint').textContent = 'JPG или PNG, до 5 МБ';
}

  const { error } = await sb.from('products').delete().eq('id',id);
  if(error) return el('formErr').textContent = 'Не удалось удалить: '+error.message;
  closeAll(); await loadAll(); go('products');
}

/* Плитки по отделам: сколько людей и как идут к плану */
function teamTiles(m0){
  const act = S.employees.filter(e=>S.eFilter.off || e.active!==false);
  const revOf = list => S.orders
    .filter(o=>list.some(e=>e.id===o.owner_id) && new Date(o.created_at)>=m0 && o.statuses?.code==='won')
    .reduce((a,o)=>a + +o.amount, 0);

  const cards = S.departments.map(d=>{
    const list = act.filter(e=>e.department_id===d.id);
    return { name:d.name, n:list.length, rev:revOf(list),
             plan:list.reduce((a,e)=>a + (+e.plan_month||0), 0),
             head:S.employees.find(e=>e.id===d.head_id)?.full_name || '' };
  });
  const noDep = act.filter(e=>!e.department_id);
  if(noDep.length) cards.push({ name:'Без отдела', n:noDep.length, rev:revOf(noDep),
                                plan:noDep.reduce((a,e)=>a + (+e.plan_month||0), 0), head:'' });

  cards.sort((a,b)=> b.n - a.n || a.name.localeCompare(b.name,'ru'));
  if(!cards.length) return '';

  return `<div class="tiles">${cards.map(c=>{
    const pct = c.plan ? Math.round(c.rev / c.plan * 100) : null;
    return `<div class="tile ${c.n===0?'warn':''}" style="min-width:160px">
      <div class="n">${c.n}</div>
      <div class="t" title="${esc(c.name)}">${esc(c.name)}</div>
      <div class="s">${
        !c.n ? 'нет сотрудников'
        : pct===null ? M(c.rev)
        : `${M(c.rev)} · ${pct}% плана`}</div>
      ${pct!==null && c.n ? `<div class="bar" style="margin-top:8px;height:5px">
        <i style="width:${Math.min(100,pct)}%"></i></div>` : ''}
      ${c.head ? `<div class="s" style="margin-top:6px">${esc(c.head)}</div>` : ''}
    </div>`;}).join('')}</div>`;
}

function sortTeam(by){
  const st = S.eSort;
  st.dir = (st.by === by) ? -st.dir : (['name','role','dep'].includes(by) ? 1 : -1);
  st.by = by;
  drawTeam();
}

function drawTeam(){
  const isAdmin = S.me.role==='admin';
  const m0 = new Date(); m0.setDate(1); m0.setHours(0,0,0,0);
  el('etiles').innerHTML = teamTiles(m0);

  const f = S.eFilter, q = f.q.trim().toLowerCase();
  const depName = e => S.departments.find(d=>d.id===e.department_id)?.name || '';

  let rows = S.employees.filter(e=>{
    if(!f.off && e.active===false) return false;
    if(f.dep==='none' && e.department_id) return false;
    if(f.dep && f.dep!=='none' && String(e.department_id)!==f.dep) return false;
    if(f.role && e.role!==f.role) return false;
    if(q){
      const qd = q.replace(/\D/g,'');   // цифры из запроса; пустая строка не должна совпадать со всем
      const byName  = (e.full_name||'').toLowerCase().includes(q);
      const byPhone = qd !== '' && ((e.login_phone||'')+(e.phone||'')).includes(qd);
      if(!byName && !byPhone) return false;
    }
    return true;
  }).map(e=>{
    const os = S.orders.filter(o=>o.owner_id===e.id && new Date(o.created_at)>=m0);
    const won = os.filter(o=>o.statuses?.code==='won');
    const rev = won.reduce((s,o)=>s+ +o.amount,0);
    return { e, n:os.length, w:won.length, rev, conv: os.length?won.length/os.length*100:0 };
  });

  const { by, dir } = S.eSort;
  const key = {
    name: r => r.e.full_name || '',
    role: r => ROLE_NAME[r.e.role] || '',
    dep:  r => depName(r.e),
    n:    r => r.n,  w: r => r.w,  conv: r => r.conv,  rev: r => r.rev,
    plan: r => +r.e.plan_month || 0,
  }[by] || (r => r.rev);
  const isText = ['name','role','dep'].includes(by);
  rows.sort((a,b)=>{
    const x = key(a), y = key(b);
    if(isText){
      if(!x && y) return 1;
      if(x && !y) return -1;
      return String(x).localeCompare(String(y),'ru') * dir;
    }
    return (x - y) * dir;
  });

  const totRev = rows.reduce((a,r)=>a+r.rev,0);
  const cnt = el('ecount');
  if(cnt) cnt.textContent = rows.length ? `${rows.length} чел. · ${M(totRev)}` : '';

  if(!rows.length){
    el('etbl').innerHTML = `<div class="empty"><b>Никого не нашлось</b>Измените фильтр или очистите поиск</div>`;
    return;
  }

  const th = (label, k) => {
    const on = S.eSort.by === k;
    return `<th class="sortable ${on?'on':''}" onclick="sortTeam('${k}')">${label}<span class="arw">${
      on ? (S.eSort.dir>0?'↑':'↓') : ''}</span></th>`;
  };
  const sortBtn = (label,k)=>`<button class="${S.eSort.by===k?'on':''}" onclick="sortTeam('${k}')">${label}${
    S.eSort.by===k ? (S.eSort.dir>0?' ↑':' ↓') : ''}</button>`;

  el('etbl').innerHTML = `
  <div class="sortbar">${sortBtn('Выручка','rev')}${sortBtn('Конверсия','conv')}${sortBtn('Заказов','n')}${sortBtn('Имя','name')}${sortBtn('Отдел','dep')}</div>
  <div class="tw"><table><thead><tr>
    <th class="num">№</th>${th('Менеджер','name')}${th('Роль','role')}${th('Отдел','dep')}${th('Заказов','n')}
    ${th('Оплачено','w')}${th('Конверсия','conv')}${th('Выручка','rev')}${th('План','plan')}
    ${isAdmin?'<th></th>':''}</tr></thead><tbody>
    ${rows.map((r,i)=>`<tr style="${r.e.active===false?'opacity:.45':''}">
      <td class="num">${i+1}</td>
      <td><span class="avatar" style="margin-right:8px">${ini(r.e.full_name)}</span><b>${esc(r.e.full_name)}</b>
        ${r.e.active===false?'<span class="tag" style="background:var(--line);color:var(--mute);margin-left:6px">отключён</span>':''}
        ${(r.e.login_phone||r.e.phone)?`<div class="mono" style="font-size:12px;color:var(--mute);margin-left:34px">${esc(prettyPhone(r.e.login_phone)||r.e.phone)}</div>`:''}</td>
      <td style="color:var(--mute)">${esc(ROLE_NAME[r.e.role]||r.e.role)}</td>
      <td style="color:var(--mute)">${esc(depName(r.e)||'—')}</td>
      <td>${r.n}</td><td>${r.w}</td>
      <td class="${r.conv>=30?'up':''}">${r.conv.toFixed(0)}%</td>
      <td class="mono" style="font-weight:700">${money(r.rev)}</td>
      <td style="min-width:130px">${r.e.plan_month?`<div class="bar"><i style="width:${Math.min(100,r.rev/r.e.plan_month*100)}%"></i></div>
        <div style="font-size:11px;color:var(--mute);margin-top:4px">${money(r.e.plan_month)}</div>`:'<span style="color:var(--mute)">—</span>'}</td>
      ${isAdmin?`<td><button class="btn sm ghost" onclick="editEmployee('${r.e.id}')">Изменить</button></td>`:''}
    </tr>`).join('')}</tbody></table></div>
  <div class="clist">${rows.map(r=>`
    <div class="crow" ${isAdmin?`onclick="editEmployee('${r.e.id}')"`:''} ${r.e.active===false?'style="opacity:.5"':''}>
      <span class="avatar" style="width:38px;height:38px;border-radius:12px;font-size:13px">${ini(r.e.full_name)}</span>
      <div class="main">
        <div class="ttl">${esc(r.e.full_name)}</div>
        <div class="sub">
          <span>${esc(ROLE_NAME[r.e.role]||r.e.role)}</span>
          ${depName(r.e)?`<span>· ${esc(depName(r.e))}</span>`:''}
          ${r.e.active===false?'<span class="tag" style="background:var(--line);color:var(--mute)">отключён</span>':''}
        </div>
        <div class="sub">${r.n} зак. · ${r.w} опл. · <span class="${r.conv>=30?'up':''}">${r.conv.toFixed(0)}%</span></div>
        ${r.e.plan_month?`<div class="bar" style="margin-top:7px;height:6px"><i style="width:${Math.min(100,r.rev/r.e.plan_month*100)}%"></i></div>`:''}
      </div>
      <div class="right">
        <div class="mono" style="font-weight:700">${moneyShort(r.rev)}</div>
        ${r.e.plan_month?`<div style="font-size:11px;color:var(--mute)">из ${moneyShort(r.e.plan_month)}</div>`:''}
      </div>
    </div>`).join('')}</div>`;
}

/* ---------- УПРАВЛЕНИЕ СОТРУДНИКАМИ ---------- */
async function callUserFn(payload){
  const { data:{ session } } = await sb.auth.getSession();
  const r = await fetch(SUPABASE_URL + FN.createUser, { method:'POST',
    headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+session.access_token,
              'apikey': SUPABASE_ANON },
    body: JSON.stringify(payload) });
  let d = {}; try{ d = await r.json(); }catch{}
  if(!r.ok) throw new Error(d.error || 'Сервис недоступен. Проверьте, что функция create-user развёрнута.');
  return d;
}
const depOptions = sel => '<option value="">— не указан —</option>' +
  S.departments.filter(d=>d.active!==false).map(d=>
    `<option value="${d.id}" ${d.id===sel?'selected':''}>${esc(d.name)}</option>`).join('');
const roleOptions = sel => ['sales','head','admin'].map(v=>

function newEmployee(){
  formModal('Новый сотрудник',`
    <div class="field"><label>Имя и фамилия</label><input id="n_name" placeholder="Айгерим Сатпаева"></div>
    <div class="field"><label>Телефон — это логин</label>
      <div class="tel"><span class="pfx">+7</span>
        <input id="n_phone" type="tel" inputmode="numeric" maxlength="14"
          placeholder="777 123 45 67" oninput="maskTel(this)"></div></div>
    <div class="field"><label>Пароль для первого входа</label>
      <input id="n_pw" placeholder="придумайте пароль, от 6 символов" autocomplete="new-password"></div>
    <div class="field"><label>Роль</label><select id="n_role">${roleOptions('sales')}</select></div>
    <div class="field"><label>Отдел</label><select id="n_dep">${depOptions(null)}</select></div>
    <div class="field"><label>План на месяц, ₸</label><input id="n_plan" type="number" inputmode="numeric" value="0"></div>`,
  async()=>{
    const d = normPhone(el('n_phone').value), pw = el('n_pw').value;
    if(d.length !== 11) return el('formErr').textContent = 'Введите 10 цифр номера, например 777 123 45 67';
    if(pw.length < 6) return el('formErr').textContent = 'Придумайте пароль от 6 символов';
    el('saveBtn').textContent = 'Создаю…'; el('saveBtn').disabled = true;
    try{
      await callUserFn({ phone:d, password:pw, full_name:el('n_name').value.trim(),
        role:el('n_role').value, department_id:+el('n_dep').value||null,
        plan_month:+el('n_plan').value||0 });
      closeAll(); await loadAll(); go('team');
      alert('Сотрудник добавлен.\n\nДанные для входа:\nТелефон: '+prettyPhone(d)+'\nПароль: '+pw);
    }catch(e){
      el('formErr').textContent = e.message;
      el('saveBtn').textContent = 'Сохранить'; el('saveBtn').disabled = false;
    }
  });

function editEmployee(id){
  const e = S.employees.find(x=>x.id===id); if(!e) return;
  const self = id === S.user.id;
  formModal('Сотрудник: '+esc(e.full_name||''),`
    <div class="field"><label>Имя и фамилия</label><input id="e_name" value="${esc(e.full_name||'')}"></div>
    <div class="field"><label>Роль</label><select id="e_role" ${self?'disabled':''}>${roleOptions(e.role)}</select>
      ${self?'<div style="font-size:12px;color:var(--mute);margin-top:4px">Свою роль изменить нельзя</div>':''}</div>
    <div class="field"><label>Телефон (логин)</label>
      <input value="${esc(prettyPhone(e.login_phone)||e.phone||'')}" disabled>
      <div style="font-size:12px;color:var(--mute);margin-top:4px">Номер входа менять нельзя</div></div>
    <div class="field"><label>Отдел</label><select id="e_dep">${depOptions(e.department_id)}</select></div>
    <div class="field"><label>План на месяц, ₸</label><input id="e_plan" type="number" inputmode="numeric" value="${e.plan_month||0}"></div>
    <div class="field"><label>Доступ в систему</label>
      <select id="e_active" ${self?'disabled':''}>
        <option value="1" ${e.active!==false?'selected':''}>Открыт</option>
        <option value="0" ${e.active===false?'selected':''}>Закрыт</option></select></div>
    <div style="border-top:1px solid var(--line);margin:16px 0 12px;padding-top:14px">
      <label>Новый пароль</label>
      <input id="e_pw" placeholder="оставьте пустым, если не меняете" autocomplete="new-password">
      <div style="font-size:12px;color:var(--mute);margin-top:4px">
        Изменится по кнопке «Сохранить» вместе с остальными полями</div>
    </div>
    ${self?'':`<button class="btn sm ghost" style="color:var(--alert);border-color:var(--alert)"
      onclick="removeEmployee('${id}','${esc(e.full_name||'')}')">Удалить сотрудника</button>`}`,
  async()=>{
    const pw = el('e_pw').value;
    if(pw && pw.length < 6) return el('formErr').textContent = 'Пароль должен быть от 6 символов';

    const patch = { full_name:el('e_name').value.trim(),
                    department_id:+el('e_dep').value||null, plan_month:+el('e_plan').value||0 };
    if(!self){ patch.role = el('e_role').value; patch.active = el('e_active').value==='1'; }

    el('saveBtn').textContent = 'Сохраняю…'; el('saveBtn').disabled = true;
    const done = m => { el('saveBtn').textContent='Сохранить'; el('saveBtn').disabled=false;
                        el('formErr').textContent = m; };

    const { error } = await sb.from('employees').update(patch).eq('id',id);
    if(error) return done('Не удалось сохранить: '+error.message);

    if(pw){
      try{ await callUserFn({ action:'password', id, password:pw }); }
      catch(e){ return done('Данные сохранены, но пароль не изменён: '+e.message); }
    }
    closeAll(); await loadAll(); go('team');
    if(pw) alert('Готово.\n\nНовый пароль: '+pw+'\nПередайте его сотруднику.');
  });
}

async function removeEmployee(id,name){
  if(!confirm('Удалить '+name+'? Доступ пропадёт сразу, заказы останутся в системе без владельца.')) return;
  try{
    await callUserFn({ action:'delete', id });
    closeAll(); await loadAll(); go('team');
  }catch(e){ el('formErr').textContent = e.message; }
}

/* ---------- АНАЛИТИКА ---------- */
function vAnalytics(){
  const os = S.orders;
  const funnel = S.statuses.map(s=>({ s, n:os.filter(o=>o.status_id===s.id).length,
                                      sum:os.filter(o=>o.status_id===s.id).reduce((a,o)=>a+ +o.amount,0) }));
  const mxF = Math.max(1,...funnel.map(f=>f.n));
  const bySrc = S.sources.map(s=>{
    const l = os.filter(o=>o.source_id===s.id), w = l.filter(o=>o.statuses?.code==='won');
    return { name:s.name, n:l.length, rev:w.reduce((a,o)=>a+ +o.amount,0), conv:l.length?w.length/l.length*100:0 };
  }).sort((a,b)=>b.rev-a.rev);
  // выручка по месяцам
  const mons = {}; os.filter(o=>o.statuses?.code==='won').forEach(o=>{
    const k = new Date(o.closed_at||o.created_at).toLocaleDateString('ru-RU',{month:'short',year:'2-digit'});
    mons[k]=(mons[k]||0)+ +o.amount; });
  const mEnt = Object.entries(mons).slice(-8), mxM = Math.max(1,...mEnt.map(m=>m[1]));

  el('view').innerHTML = H('Аналитика','Вся команда', `<button class="btn ghost" onclick="aiReport()">Отчёт от AI</button>`) +
  `<div class="grid" style="grid-template-columns:1fr 1fr">
    <div class="card"><h3 style="font-size:16px;margin-bottom:14px">Воронка</h3>
      ${funnel.map(f=>`<div style="margin-bottom:12px">
        <div class="row" style="justify-content:space-between;font-size:13px;margin-bottom:5px;flex-wrap:nowrap;gap:10px">
          <span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.s.name)}</span>
          <span class="mono" style="color:var(--mute);white-space:nowrap">${f.n} · ${M(f.sum)}</span></div>
        <div class="bar"><i style="width:${f.n/mxF*100}%;background:${f.s.color}"></i></div></div>`).join('')}</div>
    <div class="card"><h3 style="font-size:16px;margin-bottom:14px">Выручка по месяцам</h3>
      <div class="spark" style="height:120px">${mEnt.map(([k,v])=>`<i class="hot" style="height:${v/mxM*100}%" title="${k}: ${money(v)}"></i>`).join('')}</div>
      <div class="row" style="justify-content:space-between;color:var(--mute);font-size:11px;margin-top:8px;flex-wrap:nowrap">
        ${mEnt.map(([k])=>`<span>${k}</span>`).join('')}</div></div>
  </div>
  <div class="card" style="margin-top:14px"><h3 style="font-size:16px;margin-bottom:12px">Источники заявок</h3>
    ${bySrc.length?`
    <div class="tw"><table><thead><tr><th>Источник</th><th>Заявок</th><th>Конверсия</th><th>Выручка</th></tr></thead><tbody>
      ${bySrc.map(s=>`<tr><td style="font-weight:600">${esc(s.name)}</td><td>${s.n}</td>
        <td class="${s.conv>=25?'up':''}">${s.conv.toFixed(0)}%</td><td class="mono">${money(s.rev)}</td></tr>`).join('')}
      </tbody></table></div>
    <div class="clist">${bySrc.map(s=>`
      <div class="crow" style="cursor:default">
        <div class="main"><div class="ttl">${esc(s.name)}</div>
          <div class="sub">${s.n} заявок · конверсия <span class="${s.conv>=25?'up':''}">${s.conv.toFixed(0)}%</span></div></div>
        <div class="right"><div class="mono" style="font-weight:700">${moneyShort(s.rev)}</div></div>
      </div>`).join('')}</div>`
    :'<div class="empty" style="padding:20px">Источники не заполнены</div>'}</div>`;

    ${richBlk('Отделы', S.departments, 'dep')}
    ${richBlk('Категории товаров', S.categories, 'cat')}
    ${blk('Этапы воронки', S.statuses, 'statuses')}
    ${blk('Источники заявок', S.sources, 'sources')}
  </div>`;
}

/* Единая карточка для отделов и категорий */
const REF = {
  dep: { table:'departments', one:'отдел', title:'Отдел', newTitle:'Новый отдел',
         ph:'Холодные звонки', link:'department_id', linkedIn:'employees', unit:'чел.',
         warn:n=>`В отделе ${n} чел. После удаления они останутся без отдела.` },
  cat: { table:'categories', one:'категорию', title:'Категория', newTitle:'Новая категория',
         ph:'Питьевая вода', link:'category_id', linkedIn:'products', unit:'поз.',
         warn:n=>`В категории ${n} поз. После удаления они останутся без категории.` },
};

function editRef(kind, id){
  const c = REF[kind];
  const list = kind==='dep' ? S.departments : S.categories;
  const r = id ? list.find(x=>x.id===id) : null;
  formModal(r ? c.title+': '+esc(r.name) : c.newTitle, `
    <div class="field"><label>Название</label>
      <input id="r_name" value="${r?esc(r.name):''}" placeholder="${c.ph}"></div>
    ${kind==='dep'?`<div class="field"><label>Руководитель</label><select id="r_head">
      <option value="">— не назначен —</option>
      ${S.employees.filter(e=>e.active!==false).map(e=>
        `<option value="${e.id}" ${r&&e.id===r.head_id?'selected':''}>${esc(e.full_name||'')}</option>`).join('')}
    </select></div>`:''}
    <div class="field"><label>Статус</label><select id="r_active">
      <option value="1" ${!r||r.active!==false?'selected':''}>${kind==='dep'?'Работает':'Используется'}</option>
      <option value="0" ${r&&r.active===false?'selected':''}>${kind==='dep'?'Закрыт':'Не используется'}</option>
    </select></div>
    ${r?`<button class="btn sm ghost" style="color:var(--alert);border-color:var(--alert)"
      onclick="delRefCard('${kind}',${r.id},'${esc(r.name)}')">Удалить</button>`:''}`,
  async()=>{
    const name = el('r_name').value.trim();
    if(!name) return el('formErr').textContent = 'Укажите название';
    const patch = { name, active: el('r_active').value==='1' };
    if(kind==='dep') patch.head_id = el('r_head').value || null;
    const { error } = r ? await sb.from(c.table).update(patch).eq('id',r.id)
                        : await sb.from(c.table).insert(patch);
    if(error) return el('formErr').textContent = error.message.includes('duplicate')
      ? 'Такое название уже есть' : 'Не удалось сохранить: '+error.message;
    closeAll(); await loadAll(); go('refs');
  });
}

async function delRefCard(kind, id, name){
  const c = REF[kind];
  const cnt = (kind==='dep' ? S.employees : S.products).filter(x=>x[c.link]===id).length;
  if(!confirm(cnt ? c.warn(cnt)+' Продолжить?' : `Удалить ${c.one} «${name}»?`)) return;
  const { error } = await sb.from(c.table).delete().eq('id',id);
  if(error) return el('formErr').textContent = 'Не удалось удалить: '+error.message;
  closeAll(); await loadAll(); go('refs');
}

/* Простые справочники */
async function addRef(t){
  const titles = { statuses:'этапа воронки', sources:'источника заявок' };
  const name = prompt('Название '+(titles[t]||'записи'));
  if(!name || !name.trim()) return;
  const v = { name: name.trim() };
  if(t==='statuses'){
    v.code = 'st_' + Date.now();
    v.color = '#6f7687';
    v.sort = (S.statuses.at(-1)?.sort || 0) + 1;
  }
  const { error } = await sb.from(t).insert(v);
  if(error) return alert('Не удалось сохранить: '+error.message);
  await loadAll(); go('refs');
}
async function delRef(t,id){
  if(t==='statuses'){
    const used = S.orders.filter(o=>o.status_id===id).length;
    if(used) return alert('Нельзя удалить: на этом этапе '+used+' заказ(ов). Сначала переведите их в другой этап.');
  }
  if(!confirm('Удалить запись?')) return;
  const { error } = await sb.from(t).delete().eq('id',id);
  if(error) return alert('Не удалось удалить: '+error.message);
  await loadAll(); go('refs');
}
/* ---------- ФОРМЫ ---------- */
function formModal(title,html,onSave){
  closeAll();
  document.body.insertAdjacentHTML('beforeend',`<div class="scrim" onclick="closeAll()"></div>
  <div class="modal"><div class="card" style="position:relative"><button class="x" onclick="closeAll()">×</button>
    <h2 style="font-size:20px;margin-bottom:16px;padding-right:44px">${title}</h2>${html}
    <div class="row" style="margin-top:8px"><button class="btn" id="saveBtn">Сохранить</button>
    <button class="btn ghost" onclick="closeAll()">Отмена</button></div>
    <div class="err" id="formErr"></div></div></div>`);
  el('saveBtn').onclick = onSave;
}
function newOrder(){
  formModal('Новый заказ',`
    <div class="field"><label>Имя клиента</label><input id="f_name"></div>
    <div class="field"><label>Телефон</label><input id="f_phone" type="tel" inputmode="tel" placeholder="+7"></div>
    <div class="field"><label>Сумма</label><input id="f_amount" type="number" inputmode="numeric" value="0"></div>
    <div class="field"><label>Источник</label><select id="f_src"><option value="">—</option>
      ${S.sources.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select></div>
    <div class="field"><label>Комментарий</label><textarea id="f_comment" rows="3"></textarea></div>`,
  async()=>{
    const name=el('f_name').value.trim(); if(!name) return el('formErr').textContent='Укажите имя клиента';
    const phone=el('f_phone').value.trim();
    let cust = phone ? S.customers.find(c=>c.phone===phone) : null;
    if(!cust){ const {data} = await sb.from('customers').insert({name,phone,owner_id:S.user.id,
      source_id:+el('f_src').value||null}).select().single(); cust=data; }
    const { error } = await sb.from('orders').insert({ number:'ORD-'+Date.now(), customer_id:cust.id,
      owner_id:S.user.id, status_id:S.statuses[0]?.id, amount:+el('f_amount').value||0,
      source_id:+el('f_src').value||null, comment:el('f_comment').value.trim() });
    if(error) return el('formErr').textContent='Не удалось сохранить: '+error.message;
    closeAll(); await loadAll(); go(S.tab);
  });
}
function newCustomer(){
  formModal('Новый клиент',`
    <div class="field"><label>Имя</label><input id="c_name"></div>
    <div class="field"><label>Телефон</label><input id="c_phone" type="tel" inputmode="tel"></div>
    <div class="field"><label>Компания</label><input id="c_comp"></div>
    <div class="field"><label>Почта</label><input id="c_mail" type="email" inputmode="email"></div>`,
  async()=>{
    const name=el('c_name').value.trim(); if(!name) return el('formErr').textContent='Укажите имя';
    const { error } = await sb.from('customers').insert({ name, phone:el('c_phone').value.trim(),
      company:el('c_comp').value.trim(), email:el('c_mail').value.trim(), owner_id:S.user.id });
    if(error) return el('formErr').textContent='Не удалось сохранить: '+error.message;
    closeAll(); await loadAll(); go('customers');
  });
}
/* ==========================================================
   AI-АГЕНТ
   ========================================================== */
function snapshot(){
  const m0=new Date(); m0.setDate(1); m0.setHours(0,0,0,0);
  const os = myOrders(), mth = os.filter(o=>new Date(o.created_at)>=m0);
  const won = mth.filter(o=>o.statuses?.code==='won');
  return {
    роль: S.me.role, менеджер: S.me.full_name,
    заказов_за_месяц: mth.length, оплачено: won.length,
    выручка: won.reduce((s,o)=>s+ +o.amount,0),
    план: S.me.plan_month,
    конверсия: mth.length?(won.length/mth.length*100).toFixed(1)+'%':'—',
    по_этапам: S.statuses.map(s=>({этап:s.name, шт:os.filter(o=>o.status_id===s.id).length,
      сумма:os.filter(o=>o.status_id===s.id).reduce((a,o)=>a+ +o.amount,0)})),
    зависшие: os.filter(o=>!['won','lost'].includes(o.statuses?.code)&&days(o.created_at)>3)
      .slice(0,10).map(o=>({клиент:o.customers?.name, этап:o.statuses?.name, дней:days(o.created_at), сумма:+o.amount})),
    команда: S.me.role!=='sales' ? S.employees.map(e=>{
      const l=S.orders.filter(o=>o.owner_id===e.id&&new Date(o.created_at)>=m0);
      const w=l.filter(o=>o.statuses?.code==='won');
      return {имя:e.full_name, заказов:l.length, оплачено:w.length, выручка:w.reduce((s,o)=>s+ +o.amount,0)};
    }) : undefined,
    товары_топ: S.products.slice(0,15).map(p=>({название:p.name, цена:+p.price, остаток:+p.stock})),
  };
}
const SYS = `Ты — аналитик и наставник в отделе продаж торговой компании (холодные звонки, Казахстан, валюта тенге).
Отвечай по-русски, коротко и по делу, без вступлений и общих слов.
Опирайся только на переданные данные CRM. Если данных не хватает — скажи, каких именно.
Когда даёшь рекомендации — они должны быть конкретными действиями с именами клиентов и цифрами, а не советами вроде «улучшить работу с возражениями».
Для скриптов и сообщений пиши готовый текст, который менеджер может произнести или отправить.`;

async function ask(prompt, remember=true){
  const msgs = remember ? [...S.ai.map(m=>({role:m.r==='u'?'user':'assistant',content:m.t})),{role:'user',content:prompt}]
                        : [{role:'user',content:prompt}];
  const { data:{ session } } = await sb.auth.getSession();
  const r = await fetch(SUPABASE_URL + FN.ai, { method:'POST',
    headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+session.access_token,
              'apikey': SUPABASE_ANON },
    body: JSON.stringify({
      system: SYS + '\n\nТекущие данные CRM:\n' + JSON.stringify(snapshot()),
      messages: msgs })});
  let d = {}; try{ d = await r.json(); }catch{}
  if(!r.ok) throw new Error(d.error || 'Помощник недоступен. Проверьте, что функция ai развёрнута и задан ключ ANTHROPIC_API_KEY.');
  return d.text || 'Ответ не получен.';
}
function vAI(){
  el('view').innerHTML = H('AI-помощник','Разбор сделок, аналитика и тренировка скриптов') +
  `<div class="card ai">
    <div class="msgs" id="msgs">${S.ai.length?'':`<div class="empty"><b>Спросите что угодно про ваши продажи</b>
      Помощник видит ваши заказы, этапы, план и команду</div>`}</div>
    <div class="chips">
      <button class="chip" onclick="aiSay('Что у меня сейчас горит? Дай список из 3 сделок и что сделать по каждой')">Что горит</button>
      <button class="chip" onclick="aiSay('Разбери мою воронку: где я теряю больше всего и почему')">Разбор воронки</button>
      <button class="chip" onclick="aiSay('Составь скрипт холодного звонка под наш товар')">Скрипт звонка</button>
      <button class="chip" onclick="aiSay('Разбери типовые возражения по нашим сделкам и дай ответы')">Возражения</button>
      <button class="chip" onclick="aiSay('Дай прогноз выручки до конца месяца и что нужно закрыть, чтобы выйти на план')">Прогноз</button>
    </div>
    <div class="row" style="margin-top:4px;flex-wrap:nowrap">
      <input id="aiq" placeholder="Спросите про сделки или скрипты" style="flex:1;min-width:0"
        onkeydown="if(event.key==='Enter')aiSay(this.value)">
      <button class="btn" onclick="aiSay(el('aiq').value)" style="flex:none">→</button>
    </div>
  </div>`;
  drawAI();
}
function drawAI(){
  const m = el('msgs'); if(!m) return;
  m.innerHTML = S.ai.map(x=>`<div class="msg ${x.r}">${esc(x.t)}</div>`).join('');
  m.scrollTop = m.scrollHeight;
}
async function aiSay(text){
  text = (text||'').trim(); if(!text) return;
  if(S.tab!=='ai'){ go('ai'); }
  el('aiq') && (el('aiq').value='');
  el('aiq') && el('aiq').blur();
  S.ai.push({r:'u',t:text}); drawAI();
  el('msgs').insertAdjacentHTML('beforeend','<div class="msg a" id="tp"><span class="dots"><i></i><i></i><i></i></span></div>');
  el('msgs').scrollTop = el('msgs').scrollHeight;
  let out; try{ out = await ask(text); }catch(e){ out = 'Не удалось получить ответ: ' + e.message; }
  el('tp')?.remove(); S.ai.push({r:'a',t:out}); drawAI();
}
function aiReport(){ go('ai'); aiSay('Сделай отчёт для руководителя: главные цифры, кто из менеджеров проседает и по какой причине, три решения на следующую неделю.'); }
async function aiOrder(id){
  const o = S.orders.find(x=>x.id===id);
  const { data:acts } = await sb.from('activities').select('type,body,created_at').eq('order_id',id).order('created_at');
  closeAll(); go('ai');
  aiSay(`Разбери сделку. Клиент: ${o.customers?.name}. Сумма: ${money(o.amount)}. Этап: ${o.statuses?.name}. В работе ${days(o.created_at)} дней. Комментарий: ${o.comment||'нет'}. История: ${JSON.stringify(acts||[])}.
Дай: 1) причину, почему сделка стоит; 2) следующее действие; 3) готовый текст сообщения клиенту.`);
}

/* закрытие шторок по кнопке «назад» на Android */
window.addEventListener('popstate', ()=>{ if(document.querySelector('.scrim')) closeAll(); });

/* Перерисовка только при смене ШИРИНЫ. Изменение высоты (скрытие адресной
   строки браузера, появление клавиатуры) игнорируем — иначе экран мигает. */
let rzT, lastW = window.innerWidth;
window.addEventListener('resize', ()=>{
  if(window.innerWidth === lastW) return;
  lastW = window.innerWidth;
  clearTimeout(rzT); rzT = setTimeout(()=>{ if(S.me) go(S.tab); }, 250);
});

boot();
</script>
